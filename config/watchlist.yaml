# =============================================================================
# Watchlist for Cash-Secured Short Put Scanner
# =============================================================================
# Fields:
#   symbol        : IB ticker.
#   stk_exchange  : Exchange für Stock-Qualifizierung. "SMART" = IB Smart Routing.
#   opt_exchange  : Exchange für Options-Fetch. US-Aktien: "SMART".
#                   Europäische Aktien: z.B. "EUREX".
#   trading_class : IB Trading Class (optional). Leer = automatisch von IB.
#                   Nötig wenn IB-Autodetection falsche Klasse liefert (z.B. SAP → "SAP").
#   currency      : Währung des Underlyings ("USD" oder "EUR").
#   max_strike    : Höchster Strike, den der Scanner berücksichtigt ("Wunschniveau").
#                   Nur Puts mit strike <= max_strike werden analysiert.
#   max_contracts : Maximale Kontraktzahl pro Underlying (informativ).
#   notes         : Freitext-Kommentar.
# =============================================================================

watchlist:
  - symbol: SPY
    stk_exchange: SMART   # ARCA ist SPY's Primärbörse; für IB-Optionsabfragen
    opt_exchange: SMART   # (reqSecDefOptParams) muss SMART verwendet werden.
    currency: USD
    max_strike: 500.0     # Anpassen je nach aktuellem Kurs (~560 USD, April 2026)
    max_contracts: 5
    notes: "S&P 500 ETF. Sehr liquide, enge Spreads, viele Expiries. OTM-Puts als Absicherung."

  - symbol: AAPL
    stk_exchange: SMART
    opt_exchange: SMART
    currency: USD
    max_strike: 150.0
    max_contracts: 10
    notes: "Zu tief gefallen, um sie nicht zu wollen. Solide Dividende."

  - symbol: NVDA
    stk_exchange: SMART
    opt_exchange: SMART
    currency: USD
    max_strike: 150.0
    max_contracts: 10
    notes: "Zu tief gefallen, um sie nicht zu wollen. Solide Dividende."

  - symbol: PLTR
    stk_exchange: SMART
    opt_exchange: SMART
    currency: USD
    max_strike: 100.0
    max_contracts: 10
    notes: "Zu tief gefallen, um sie nicht zu wollen. Solide Dividende."
